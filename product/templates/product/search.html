{%extends 'product/base.html'%}


{% block content %}
  

  {% for product in products %}
    <p>
      <a href="{{product.get_absolute_url}}">
      {{product.name}}
      </a>
    </p>
    <p>
      <a href="{{product.get_absolute_url}}"><img src="{{product.image.url}}" width="200" height="200" alt="{{product.name}}">
      </a>
  {% empty %}
    <p>Пусто</p>
  {% endfor %}

    
{% endblock content %}
